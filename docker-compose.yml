services:
  app:
    container_name: entornoci
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  lint:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: npm run lint
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    profiles:
      - checks

  test:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: npm test
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    profiles:
      - checks

volumes:
  node_modules:
