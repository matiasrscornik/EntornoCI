<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suma por concatenación</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="page-info">
        <p>Entorno CI - Parcial 2</p>
        <p>Matias Rodriguez Scornik</p>
    </header>

    <main class="calculator">
        <h1>Calculadora</h1>
        <p class="subtitle">El resultado concatena los valores como texto.</p>

        <label for="number1">Número 1</label>
        <input type="text" id="number1" placeholder="Ej: 12">

        <label for="number2">Número 2</label>
        <input type="text" id="number2" placeholder="Ej: 34">

        <button id="concatButton" type="button">Resolver</button>
        <p id="result" class="result">Escribí dos números para ver el resultado.</p>
    </main>

    <script type="module" src="./app.js"></script>
</body>
