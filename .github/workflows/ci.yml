name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  quality-check:
    name: Lint, Test and Build
    runs-on: ubuntu-latest
    environment: ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint, tests and coverage
        run: npm run test:coverage

      - name: Build project
        run: npm run build

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        with:
          scannerVersion: 8.1.0.6389
        env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Notify Jira
        if: always()
        run: npm run jira:notify
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
          JIRA_JOB_STATUS: ${{ job.status }}
          JIRA_ISSUE_TEXT: ${{ github.event.head_commit.message }} ${{ github.ref_name }} ${{ github.event.pull_request.title }} ${{ github.event.pull_request.head.ref }} ${{ github.event.pull_request.body }}

      - name: Notify Slack on failure
        if: failure()
        run: npm run slack:notify
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: Tests y SonarCloud fallaron
          SLACK_JOB_NAME: Tests, coverage, build and SonarCloud
          SLACK_JOB_STATUS: ${{ job.status }}
          SLACK_COLOR: danger
          SLACK_MESSAGE: "❌ Fallaron las validaciones de CI en `${{ github.ref_name }}` por ${{ github.actor }}."

